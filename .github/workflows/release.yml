name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Build the N5 seed once on Linux (it's platform-independent data) and share it with the
  # per-OS build jobs, so the heavy data fetch/parse only runs once.
  seed:
    name: Build N5 seed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Fetch sources + build seed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/fetch-sources.sh
          cargo run --release -p mnemokanji-content
      - uses: actions/upload-artifact@v4
        with:
          name: seed
          path: assets/seed.sqlite
          retention-days: 1

  build:
    name: Build ${{ matrix.name }}
    needs: seed
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, name: macos-arm64, ext: '' }
          - { os: ubuntu-latest, name: linux-x64, ext: '' }
          - { os: windows-latest, name: windows-x64, ext: '.exe' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux WebView/GTK deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Download seed
        uses: actions/download-artifact@v4
        with:
          name: seed
          path: assets

      - name: Build (bundled seed)
        run: cargo build --release -p mnemokanji-ui --features bundle-seed

      - name: Package
        shell: bash
        run: |
          STAGE="MnemoKanji-${{ matrix.name }}"
          mkdir -p "$STAGE" dist
          cp "target/release/mnemokanji${{ matrix.ext }}" "$STAGE/"
          cp LICENSE README.md "$STAGE/"
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "dist/$STAGE.zip" "$STAGE" >/dev/null
          else
            tar -czf "dist/$STAGE.tar.gz" "$STAGE"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
